<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0716"/>
      <stop offset="0.55" stop-color="#0e0a1e"/>
      <stop offset="1" stop-color="#140b28"/>
    </linearGradient>
    <linearGradient id="cardTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1234"/>
      <stop offset="1" stop-color="#130c26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <g stroke="#3b2a63" stroke-width="1.2" opacity="0.28" fill="none">
    <path d="M40 60 H140 L190 110"/><circle cx="190" cy="110" r="4"/>
    <path d="M1560 470 H1460 L1410 420"/><circle cx="1410" cy="420" r="4"/>
  </g>

  <text x="800" y="62" text-anchor="middle" fill="#f5f3ff" font-size="30" font-weight="800" letter-spacing="6" filter="url(#glow)">POWER SECRETS</text>
  <text x="800" y="94" text-anchor="middle" fill="#a78bfa" font-size="14" letter-spacing="3">25 NON-OBVIOUS MECHANICS · WINGTIPS #1–#22 + JULY 2026 FIELD REPORTS · VERIFIED AGAINST THE REAL SCHEMA</text>

  <!-- five cluster cards -->
  <g filter="url(#soft)">
    <rect x="60"   y="140" width="280" height="250" rx="16" fill="url(#cardTop)" stroke="#7c3aed" stroke-opacity="0.6" stroke-width="1.5"/>
    <rect x="360"  y="140" width="280" height="250" rx="16" fill="url(#cardTop)" stroke="#7c3aed" stroke-opacity="0.6" stroke-width="1.5"/>
    <rect x="660"  y="140" width="280" height="250" rx="16" fill="url(#cardTop)" stroke="#7c3aed" stroke-opacity="0.6" stroke-width="1.5"/>
    <rect x="960"  y="140" width="280" height="250" rx="16" fill="url(#cardTop)" stroke="#7c3aed" stroke-opacity="0.6" stroke-width="1.5"/>
    <rect x="1260" y="140" width="280" height="250" rx="16" fill="url(#cardTop)" stroke="#7c3aed" stroke-opacity="0.6" stroke-width="1.5"/>
  </g>
  <rect x="60"   y="140" width="280" height="6" rx="3" fill="url(#accent)"/>
  <rect x="360"  y="140" width="280" height="6" rx="3" fill="url(#accent)"/>
  <rect x="660"  y="140" width="280" height="6" rx="3" fill="url(#gold)"/>
  <rect x="960"  y="140" width="280" height="6" rx="3" fill="url(#accent)"/>
  <rect x="1260" y="140" width="280" height="6" rx="3" fill="url(#accent)"/>

  <g text-anchor="middle" font-weight="800" fill="#e9d5ff" font-size="17">
    <text x="200"  y="182">🧠 CONTEXT &amp; CACHE</text>
    <text x="500"  y="182">💸 COST MECHANICS</text>
    <text x="800"  y="182">👤 PROFILES &amp; FILES</text>
    <text x="1100" y="182">📋 KANBAN &amp; OPS</text>
    <text x="1400" y="182">⚡ CHEAT SHEET</text>
  </g>

  <g fill="#a78bfa" font-size="12.5" text-anchor="middle">
    <text x="200" y="214">MEMORY.md is a snapshot</text>
    <text x="200" y="236">compression keeps 3 + last 20</text>
    <text x="200" y="258">compaction = structured brief</text>
    <text x="200" y="280">model switch = cache reset</text>
    <text x="200" y="302">/steer · /queue · /busy timing</text>
    <text x="200" y="324">rule files tax every prompt</text>

    <text x="500" y="214">gateway tax: 15–20k vs 6–8k</text>
    <text x="500" y="236">default cheap, escalate hard</text>
    <text x="500" y="258">benchmark the stack</text>
    <text x="500" y="280">credential pools ≠ fallbacks</text>
    <text x="500" y="302">rotation = cache miss</text>
    <text x="500" y="324">MoA is nearly free per turn</text>

    <text x="800" y="214">SOUL / USER / MEMORY roles</text>
    <text x="800" y="236">a profile is a whole agent</text>
    <text x="800" y="258">profiles ≠ filesystem walls</text>
    <text x="800" y="280">the "me layer" pattern</text>
    <text x="800" y="302">/memory + /skills approval</text>
    <text x="800" y="324">/learn needs a haircut</text>

    <text x="1100" y="214">kanban is opt-in, not "all"</text>
    <text x="1100" y="236">scratch workspace gets wiped</text>
    <text x="1100" y="258">enable-linger or die at logout</text>
    <text x="1100" y="280">disk: snapshots, not logs</text>
    <text x="1100" y="302">prune state.db</text>
    <text x="1100" y="324">export --redact to share</text>

    <text x="1400" y="214">all 25 on one page</text>
    <text x="1400" y="236">print it · tape it up</text>
    <text x="1400" y="258">CLI heavy / phone control</text>
    <text x="1400" y="280">Terra &gt; Sol on Hermes $</text>
    <text x="1400" y="302">keep Hermes in the loop</text>
    <text x="1400" y="324">verify, then trust</text>
  </g>

  <g fill="#c4b5fd" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="200"  y="366">Secrets #1–#6</text>
    <text x="500"  y="366">Secrets #7–#11</text>
    <text x="800"  y="366">Secrets #12–#16</text>
    <text x="1100" y="366">Secrets #17–#24</text>
    <text x="1400" y="366">Section 5</text>
  </g>

  <g filter="url(#soft)">
    <rect x="420" y="428" width="760" height="52" rx="26" fill="url(#cardTop)" stroke="#a855f7" stroke-opacity="0.7" stroke-width="1.5"/>
  </g>
  <text x="800" y="461" text-anchor="middle" fill="#e9d5ff" font-size="16" font-weight="700" letter-spacing="1">THE FIELD MANUAL THE DOCS DON'T GIVE YOU — PART 27</text>
</svg>
