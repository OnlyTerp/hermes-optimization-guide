<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="460" viewBox="0 0 1600 460" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0716"/>
      <stop offset="0.55" stop-color="#0e0a1e"/>
      <stop offset="1" stop-color="#140b28"/>
    </linearGradient>
    <linearGradient id="cardTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1234"/>
      <stop offset="1" stop-color="#130c26"/>
    </linearGradient>
    <linearGradient id="barGood" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="barBad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#b91c1c"/>
      <stop offset="1" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="barMid" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="460" fill="url(#bg)"/>

  <text x="800" y="54" text-anchor="middle" fill="#f5f3ff" font-size="26" font-weight="800" letter-spacing="4" filter="url(#glow)">THE GATEWAY TOKEN TAX</text>
  <text x="800" y="84" text-anchor="middle" fill="#a78bfa" font-size="14" letter-spacing="2">FIXED TOOL-DEFINITION OVERHEAD PER TURN — BEFORE YOU'VE SAID A WORD</text>

  <!-- bars panel -->
  <g filter="url(#soft)">
    <rect x="80" y="116" width="640" height="300" rx="16" fill="url(#cardTop)" stroke="#7c3aed" stroke-opacity="0.6" stroke-width="1.5"/>
  </g>

  <!-- axis baseline at y=370, 10 px per 1k tokens -->
  <line x1="140" y1="370" x2="660" y2="370" stroke="#3b2a63" stroke-width="2"/>

  <!-- CLI bar: 7k => 70px -->
  <rect x="180" y="300" width="110" height="70" rx="8" fill="url(#barGood)"/>
  <text x="235" y="284" text-anchor="middle" fill="#6ee7b7" font-size="18" font-weight="800">~6–8k</text>
  <text x="235" y="396" text-anchor="middle" fill="#d1fae5" font-size="14" font-weight="700">CLI / TUI</text>

  <!-- Kanban bar: ~8k -->
  <rect x="340" y="290" width="110" height="80" rx="8" fill="url(#barMid)"/>
  <text x="395" y="274" text-anchor="middle" fill="#c4b5fd" font-size="18" font-weight="800">lean</text>
  <text x="395" y="396" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700">Kanban workers</text>

  <!-- Messaging bar: 17.5k => 175px -->
  <rect x="500" y="195" width="110" height="175" rx="8" fill="url(#barBad)"/>
  <text x="555" y="179" text-anchor="middle" fill="#fca5a5" font-size="18" font-weight="800">~15–20k</text>
  <text x="555" y="396" text-anchor="middle" fill="#fecaca" font-size="14" font-weight="700">Telegram / Discord</text>

  <text x="400" y="148" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700" letter-spacing="1">TOKENS OF TOOL DEFINITIONS · EVERY SINGLE TURN</text>

  <!-- rule panel -->
  <g filter="url(#soft)">
    <rect x="760" y="116" width="760" height="300" rx="16" fill="url(#cardTop)" stroke="#7c3aed" stroke-opacity="0.6" stroke-width="1.5"/>
  </g>
  <text x="1140" y="156" text-anchor="middle" fill="#e9d5ff" font-size="17" font-weight="800" letter-spacing="1">THE DIVISION OF LABOR</text>

  <g font-size="14">
    <text x="800" y="196" fill="#6ee7b7" font-weight="800">CLI / TUI</text>
    <text x="1000" y="196" fill="#c4b5fd">long coding runs · research · bulk work — lowest overhead, best cache</text>
    <text x="800" y="232" fill="#c084fc" font-weight="800">Kanban</text>
    <text x="1000" y="232" fill="#c4b5fd">anything that must survive restarts — the board persists, workers run lean</text>
    <text x="800" y="268" fill="#f87171" font-weight="800">Messaging</text>
    <text x="1000" y="268" fill="#c4b5fd">kickoff · steering · receiving results — fine for short control turns</text>
  </g>

  <line x1="790" y1="292" x2="1490" y2="292" stroke="#3b2a63" stroke-width="1.5"/>

  <g font-size="13.5" fill="#a78bfa">
    <text x="800" y="322">⚠ Model switch mid-session → prompt cache reset → full history re-read at full price</text>
    <text x="800" y="350">⚠ Credential-pool rotation → same cache miss — budget for it on long sessions</text>
    <text x="800" y="378">✓ Measure your split with Langfuse traces per surface — Part 20</text>
  </g>

  <text x="800" y="444" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700" letter-spacing="1">CLI FOR HEAVY WORK · MESSAGING FOR CONTROL — PART 20 · PART 27</text>
</svg>
