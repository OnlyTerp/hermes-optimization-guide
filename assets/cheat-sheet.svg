<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0716"/>
      <stop offset="0.55" stop-color="#0e0a1e"/>
      <stop offset="1" stop-color="#140b28"/>
    </linearGradient>
    <linearGradient id="cardTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1234"/>
      <stop offset="1" stop-color="#130c26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#7c3aed" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="760" fill="url(#bg)"/>

  <text x="800" y="52" text-anchor="middle" fill="#f5f3ff" font-size="26" font-weight="800" letter-spacing="5" filter="url(#glow)">THE ONE-PAGE CHEAT SHEET</text>
  <text x="800" y="80" text-anchor="middle" fill="#a78bfa" font-size="13" letter-spacing="3">PRINT IT · TAPE IT UP — 25 RULES THAT PAY RENT EVERY SESSION</text>

  <!-- 5 x 5 grid: cell 296x116, gap 8, start x=32 y=104 -->
  <g filter="url(#soft)">
    <!-- generated grid of cards -->
    <g fill="url(#cardTop)" stroke="#7c3aed" stroke-opacity="0.5" stroke-width="1.2">
      <rect x="32"   y="104" width="298" height="116" rx="12"/><rect x="340"  y="104" width="298" height="116" rx="12"/><rect x="648"  y="104" width="298" height="116" rx="12"/><rect x="956"  y="104" width="298" height="116" rx="12"/><rect x="1264" y="104" width="298" height="116" rx="12"/>
      <rect x="32"   y="230" width="298" height="116" rx="12"/><rect x="340"  y="230" width="298" height="116" rx="12"/><rect x="648"  y="230" width="298" height="116" rx="12"/><rect x="956"  y="230" width="298" height="116" rx="12"/><rect x="1264" y="230" width="298" height="116" rx="12"/>
      <rect x="32"   y="356" width="298" height="116" rx="12"/><rect x="340"  y="356" width="298" height="116" rx="12"/><rect x="648"  y="356" width="298" height="116" rx="12"/><rect x="956"  y="356" width="298" height="116" rx="12"/><rect x="1264" y="356" width="298" height="116" rx="12"/>
      <rect x="32"   y="482" width="298" height="116" rx="12"/><rect x="340"  y="482" width="298" height="116" rx="12"/><rect x="648"  y="482" width="298" height="116" rx="12"/><rect x="956"  y="482" width="298" height="116" rx="12"/><rect x="1264" y="482" width="298" height="116" rx="12"/>
      <rect x="32"   y="608" width="298" height="116" rx="12"/><rect x="340"  y="608" width="298" height="116" rx="12"/><rect x="648"  y="608" width="298" height="116" rx="12"/><rect x="956"  y="608" width="298" height="116" rx="12"/><rect x="1264" y="608" width="298" height="116" rx="12"/>
    </g>
  </g>

  <!-- numbers -->
  <g fill="#c084fc" font-size="22" font-weight="800">
    <text x="52"   y="138">01</text><text x="360"  y="138">02</text><text x="668"  y="138">03</text><text x="976"  y="138">04</text><text x="1284" y="138">05</text>
    <text x="52"   y="264">06</text><text x="360"  y="264">07</text><text x="668"  y="264">08</text><text x="976"  y="264">09</text><text x="1284" y="264">10</text>
    <text x="52"   y="390">11</text><text x="360"  y="390">12</text><text x="668"  y="390">13</text><text x="976"  y="390">14</text><text x="1284" y="390">15</text>
    <text x="52"   y="516">16</text><text x="360"  y="516">17</text><text x="668"  y="516">18</text><text x="976"  y="516">19</text><text x="1284" y="516">20</text>
    <text x="52"   y="642">21</text><text x="360"  y="642">22</text><text x="668"  y="642">23</text><text x="976"  y="642">24</text><text x="1284" y="642">25</text>
  </g>

  <!-- rule text (two lines each) -->
  <g fill="#e9d5ff" font-size="13" font-weight="600">
    <text x="52"   y="170">CLI for heavy work;</text><text x="52"   y="190" fill="#a78bfa" font-weight="400">messaging for control</text>
    <text x="360"  y="170">Default cheap;</text><text x="360"  y="190" fill="#a78bfa" font-weight="400">frontier only when stuck</text>
    <text x="668"  y="170">MEMORY/USER snapshot</text><text x="668"  y="190" fill="#a78bfa" font-weight="400">at start — hermes -c to refresh</text>
    <text x="976"  y="170">/steer mid-run · /queue next</text><text x="976"  y="190" fill="#a78bfa" font-weight="400">/busy configures Enter</text>
    <text x="1284" y="170">/memory + /skills</text><text x="1284" y="190" fill="#a78bfa" font-weight="400">approval on — supervised</text>

    <text x="52"   y="296">After /learn, trim the</text><text x="52"   y="316" fill="#a78bfa" font-weight="400">description to ≤60 chars</text>
    <text x="360"  y="296">Profiles = rooms;</text><text x="360"  y="316" fill="#a78bfa" font-weight="400">one profile, many gateways</text>
    <text x="668"  y="296">toolsets: [kanban] +</text><text x="668"  y="316" fill="#a78bfa" font-weight="400">--workspace dir:/abs</text>
    <text x="976"  y="296">Pools ≠ fallbacks;</text><text x="976"  y="316" fill="#a78bfa" font-weight="400">rotation = cache miss</text>
    <text x="1284" y="296">Model switch = full re-read;</text><text x="1284" y="316" fill="#a78bfa" font-weight="400">use a subagent instead</text>

    <text x="52"   y="422">protect_last_n · cheap aux</text><text x="52"   y="442" fill="#a78bfa" font-weight="400">compressor · bigger window</text>
    <text x="360"  y="422">Compaction writes a brief —</text><text x="360"  y="442" fill="#a78bfa" font-weight="400">state decisions plainly</text>
    <text x="668"  y="422">loginctl enable-linger</text><text x="668"  y="442" fill="#a78bfa" font-weight="400">on every headless gateway</text>
    <text x="976"  y="422">Prune state.db past</text><text x="976"  y="442" fill="#a78bfa" font-weight="400">~384MB / ~1000 sessions</text>
    <text x="1284" y="422">Disk: state-snapshots/,</text><text x="1284" y="442" fill="#a78bfa" font-weight="400">cron output, piped stdout</text>

    <text x="52"   y="548">Telegram groups: privacy off</text><text x="52"   y="568" fill="#a78bfa" font-weight="400">+ remove/re-add the bot</text>
    <text x="360"  y="548">Docker internal-only net</text><text x="360"  y="568" fill="#a78bfa" font-weight="400">+ typed action ontology</text>
    <text x="668"  y="548">External spend kernel</text><text x="668"  y="568" fill="#a78bfa" font-weight="400">for anything touching money</text>
    <text x="976"  y="548">Big models invent busywork —</text><text x="976"  y="568" fill="#a78bfa" font-weight="400">verification contracts</text>
    <text x="1284" y="548">Terra over Sol for cost;</text><text x="1284" y="568" fill="#a78bfa" font-weight="400">Luna for the daily lane</text>

    <text x="52"   y="674">Anthropic subs don't work —</text><text x="52"   y="694" fill="#a78bfa" font-weight="400">API keys or a Claude terminal</text>
    <text x="360"  y="674">Keep Hermes in the loop —</text><text x="360"  y="694" fill="#a78bfa" font-weight="400">it owns memory + trace</text>
    <text x="668"  y="674">Remote Desktop backend =</text><text x="668"  y="694" fill="#a78bfa" font-weight="400">code runs on the server</text>
    <text x="976"  y="674">MoA ≈ free per turn —</text><text x="976"  y="694" fill="#a78bfa" font-weight="400">save it for hard calls</text>
    <text x="1284" y="674">Audit stray AGENTS.md —</text><text x="1284" y="694" fill="#a78bfa" font-weight="400">22k chars taxes every prompt</text>
  </g>

  <text x="800" y="750" text-anchor="middle" fill="#6d5b95" font-size="11" letter-spacing="2">HERMES OPTIMIZATION GUIDE · PART 27 · v0.18.2 ERA</text>
</svg>
