# ------------------------------------------------------------
# Hermes — MINIMUM config
# ------------------------------------------------------------
# The smallest possible working setup:
#   - 1 provider (Anthropic)
#   - CLI only (messaging platforms are wired via ~/.hermes/.env later)
#   - Native local memory (SQLite — zero config, see Part 7)
#   - No MCP servers
# For when you just want to see Hermes work before committing to more.
# Schema verified against Part 19 (v0.18).
# ------------------------------------------------------------

# Primary model — the one that drives the tool-calling loop.
model: claude-sonnet-5
provider: anthropic

# API keys stay in ~/.hermes/.env (chmod 600); config only references them.
providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}

# That's genuinely it. Memory, session search, and skills work with zero
# extra config. Run `hermes dashboard` later to layer on platforms, MCP
# servers, plugins, etc.
