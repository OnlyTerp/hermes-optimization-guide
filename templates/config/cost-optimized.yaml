# ------------------------------------------------------------
# Hermes — COST-OPTIMIZED config
# ------------------------------------------------------------
# Target: <$5/mo for personal daily-driver usage.
#   - Gemini Flash as the primary (cheap + fast + huge context)
#   - Every auxiliary task on cheap/free-tier models (Part 20, Rule 1 —
#     auxiliary calls are where the silent cost bloat lives)
#   - Prompt caching on, aggressive compression
#   - Sonnet only when YOU say so (/model smart)
# Schema verified against Part 19 (v0.18).
#
# Note: Hermes has no intent/complexity routing DSL (the old routing:
# block was removed upstream — see Part 20). The real levers are the
# primary model, auxiliary_models, aliases, and fallback.
# ------------------------------------------------------------

# Primary — cheap default that handles 90% of turns.
model: gemini-3.1-flash
provider: google

providers:
  google:
    oauth_enabled: true              # Hermes-managed Gemini OAuth free tier
    api_key: ${GOOGLE_API_KEY}       # Used only when OAuth is unavailable
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  moonshot:
    api_key: ${MOONSHOT_API_KEY}
  cerebras:
    api_key: ${CEREBRAS_API_KEY}
    base_url: https://api.cerebras.ai/v1
  zai:
    api_key: ${ZAI_API_KEY}

# Anthropic prompt caching for the opt-in Sonnet sessions.
prompt_caching:
  cache_ttl: "5m"

# Side-tasks to the cheapest adequate model. Cerebras Qwen 3 32B is
# near-free and 2000+ tok/s — perfect for compression/classification-ish jobs.
auxiliary_models:
  compression:
    provider: cerebras
    model: qwen-3-32b
    timeout: 30
  web_extract:
    provider: cerebras
    model: qwen-3-32b
  vision:
    provider: google
    model: gemini-3.1-flash          # needs a multimodal model
  session_search: auto
  approval: auto

# Escalate by hand when a task deserves it: /model coder, /model smart.
model_aliases:
  fast:
    model: qwen-3-32b
    provider: cerebras
  coder:
    model: kimi-k2.6
    provider: moonshot
  smart:
    model: claude-sonnet-5
    provider: anthropic
  glm:
    model: glm-5
    provider: zai

# Compress early — Flash is cheap but context is still the real cost
# (Part 20, Rule 4).
compression:
  enabled: true
  threshold: 0.35                    # trigger earlier than the 0.50 default
  target_ratio: 0.20
  protect_last_n: 12

# Fast Mode is a runtime toggle (/fast on), not a config key — leave it
# off for cron/background work; it's a cost premium.

approvals:
  mode: manual
  timeout: 60
  cron_mode: deny

command_allowlist: []

security:
  redact_secrets: true

# Telegram wiring lives in ~/.hermes/.env (Part 4):
#   TELEGRAM_BOT_TOKEN=...
#   TELEGRAM_ALLOWED_USERS=<your-numeric-user-id>
#
# Cost visibility: /usage 7d --by-provider, plus the weekly /cost-report
# cron. Hermes has no built-in cost-alert block — put alerts in your
# tracing layer (Langfuse/Helicone) or a log-tailing script (Part 20, Rule 5).
