# ------------------------------------------------------------
# Hermes — TELEGRAM BOT config
# ------------------------------------------------------------
# Opinionated setup for a personal Telegram assistant:
#   - Anthropic primary + Gemini Flash for the cheap auxiliary tasks
#   - Telegram gateway (token + allowlist live in ~/.hermes/.env — see below)
#   - Native local memory (Part 7); add LightRAG later via Part 3
#   - Sensible approval defaults
# Schema verified against Part 19 (v0.18).
# ------------------------------------------------------------

# Primary model — drives the tool-calling loop.
model: claude-sonnet-5
provider: anthropic

providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  google:
    api_key: ${GOOGLE_API_KEY}

# Anthropic prompt caching — stable prefixes (system prompt, skills, memory)
# are auto-marked cacheable; cached reads are ~90% off.
prompt_caching:
  cache_ttl: "5m"                    # "5m" or "1h" — the only two Anthropic tiers

# Route the side-tasks (classification-ish work) to a cheap model.
auxiliary_models:
  compression:
    provider: google
    model: gemini-3.1-flash
  web_extract:
    provider: google
    model: gemini-3.1-flash
  vision:
    provider: google
    model: gemini-3.1-flash

# ------------------------------------------------------------
# Telegram wiring lives in ~/.hermes/.env, not here (Part 4):
#
#   TELEGRAM_BOT_TOKEN=<from @BotFather>
#   TELEGRAM_ALLOWED_USERS=<your-numeric-user-id>   # comma-separated
#
# Hermes is default-deny: no allowlist = nobody gets in. Never set
# GATEWAY_ALLOW_ALL_USERS=true on a bot strangers can find.
#
# Want a public-facing bot too? Run it as a SEPARATE Hermes instance /
# profile with its own token and a hardened config — see Part 19 and
# templates/config/security-hardened.yaml. Don't mix trust levels in
# one deployment.
# ------------------------------------------------------------

group_sessions_per_user: true        # Each group participant gets an isolated session

# Dangerous-command approval (Part 19, Layer 2). The dangerous patterns
# are built into Hermes (tools/approval.py) — you don't write regex here.
approvals:
  mode: manual                       # manual | smart | off
  timeout: 60                        # seconds before fail-closed deny
  cron_mode: deny                    # cron jobs never auto-approve dangerous commands

# "Always approve" pattern descriptions land here when you answer
# "always" at a prompt. Start empty; review anything that appears.
command_allowlist: []

security:
  redact_secrets: true               # default on — keep it on

# Cron jobs live in ~/.hermes/cron.yaml (see Part 19 for examples), e.g.:
#   - name: nightly-backup
#     schedule: "0 3 * * *"
#     task: /nightly-backup local 30
