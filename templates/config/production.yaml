# ------------------------------------------------------------
# Hermes — PRODUCTION config
# ------------------------------------------------------------
# Full-stack, hardened, observable.
#   - Smart primary + cheap auxiliary models (the real cost lever — Part 20)
#   - Multi-provider with prompt caching + fallback
#   - MCP: GitHub, Postgres, Cloudflare, filesystem — tool-filtered
#   - Manual approval posture + tight allowlists (Part 19)
#   - Compression tuned for long sessions
# Schema verified against Part 19 (v0.18).
#
# Platform wiring (tokens + user allowlists) lives in ~/.hermes/.env:
#   TELEGRAM_BOT_TOKEN=...      TELEGRAM_ALLOWED_USERS=123456789
#   DISCORD_BOT_TOKEN=...       DISCORD_ALLOWED_USERS=1112223334445556
#   SLACK_BOT_TOKEN=...         SLACK_ALLOWED_USERS=U01ABC123
#   EMAIL_ALLOWED_USERS=you@example.com
# Hermes is default-deny — no allowlist means nobody gets in (Part 19, Layer 1).
#
# Observability: enable the bundled Langfuse plugin
# (`hermes plugins enable observability/langfuse`) and set the
# HERMES_LANGFUSE_* env vars — there is no telemetry: block in config.yaml.
# Cost/token alerts belong in Langfuse/Helicone, not here (Part 20, Rule 5).
#
# Dashboard: `hermes dashboard` serves on 127.0.0.1:9119 by default
# (Part 12). Keep it loopback-only; expose via Caddy + auth if you must.
# ------------------------------------------------------------

# Primary model — the one that drives the tool-calling loop.
model: claude-sonnet-5
provider: anthropic

providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  openai:
    api_key: ${OPENAI_API_KEY}
  google:
    api_key: ${GOOGLE_API_KEY}
  moonshot:
    api_key: ${MOONSHOT_API_KEY}
  cerebras:
    api_key: ${CEREBRAS_API_KEY}
    base_url: https://api.cerebras.ai/v1
  xai:
    api_key: ${XAI_API_KEY}
    oauth_enabled: true              # SuperGrok OAuth when available
    live_search: true

# Anthropic prompt caching — stable prefixes auto-marked; ~90% off cached reads.
prompt_caching:
  cache_ttl: "5m"

# Side-tasks off the expensive primary (Part 20, Rule 1). This is where
# most silent cost bloat lives.
auxiliary_models:
  compression:
    provider: google
    model: gemini-3.1-flash
  web_extract:
    provider: google
    model: gemini-3.1-flash
  vision:
    provider: google
    model: gemini-3.1-flash
  session_search: auto
  approval: auto

# Quick model switching in chat: /model fast, /model smart (Part 9)
model_aliases:
  fast:
    model: qwen-3-32b
    provider: cerebras
  cheap-coder:
    model: kimi-k2.6
    provider: moonshot
  smart:
    model: claude-opus-4.7
    provider: anthropic
  research:
    model: grok-4.3
    provider: xai

# Failover is managed with `hermes fallback` / `hermes config set
# fallback_models '[...]'` — it lives in a separate state file, not here.

# Context compression (Part 20, Rule 4) — percentage-of-context keyed.
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

group_sessions_per_user: true

discord:
  require_mention: true              # Only respond when @mentioned in channels

# MCP servers — documented schema: command/args/env/enabled/timeout +
# tools.include/exclude. There are no trust:/allow_sampling: knobs; trust
# is enforced by review, credential filtering, and tool filtering (Part 19, L5).
mcp_servers:
  github:
    command: npx
    args: [-y, "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PAT}   # scoped, read-mostly PAT
    enabled: true
    timeout: 120
    tools:
      include:
        - get_pull_request
        - list_pull_requests
        - get_pull_request_diff
        - create_issue
        - add_issue_comment
        - create_pull_request_review
      exclude: []
  postgres:
    command: npx
    args: [-y, "@modelcontextprotocol/server-postgres", "${POSTGRES_URL}"]
    enabled: true
    tools:
      include: [query]               # read-only surface
      exclude: []
  cloudflare:
    command: npx
    args: [-y, "@cloudflare/mcp-server-cloudflare"]
    env:
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN}"
    enabled: true
    tools:
      include: []                    # empty = all; audit before widening env scope
      exclude: []
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - ${HOME}/Documents
      - ${HOME}/Projects
    enabled: true

# Dangerous-command approval (Part 19, Layer 2). Patterns are built into
# Hermes (tools/approval.py) — this only sets the policy.
approvals:
  mode: manual                       # manual | smart | off
  timeout: 60
  cron_mode: deny                    # cron jobs hitting a dangerous command are blocked
  mcp_reload_confirm: true
  destructive_slash_confirm: true

# "Always approve" descriptions accumulate here when you answer "always".
# Review this list in every audit — each entry is a standing bypass.
command_allowlist: []

security:
  redact_secrets: true               # default on — redacts secret-like patterns from output/logs
  # Optional extra pre-exec scanning on top of the native detector:
  # tirith_enabled: true
  # tirith_path: tirith
  # tirith_timeout: 5
  # tirith_fail_open: true

# Scheduled skills live in ~/.hermes/cron.yaml (separate file), e.g.:
#   - name: nightly-backup
#     schedule: "0 3 * * *"
#     task: /nightly-backup s3://backups/hermes/ 30
#   - name: weekly-dep-audit
#     schedule: "0 9 * * 1"
#     task: /weekly-dep-audit severity_floor=high
#   - name: weekly-cost-report
#     schedule: "0 9 * * 1"
#     task: /cost-report window=7d format=markdown
#   - name: weekly-mcp-audit
#     schedule: "0 10 * * 1"
#     task: /audit-mcp
# Remember approvals.cron_mode: deny — keep cron skills read-only (Part 19).
